openapi: 3.0.3
info:
  title: Njie Outfit E-commerce API
  version: 1.0.0
  description: API contract for the Njie Outfit fashion and lifestyle e-commerce platform.
servers:
  - url: https://api.njie-outfit.example.com/v1
    description: Production API
  - url: https://api.staging.njie-outfit.example.com/v1
    description: Staging API
paths:
  /auth/register:
    post:
      summary: Register a new customer account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                name:
                  type: string
                phone:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
  /auth/login:
    post:
      summary: Authenticate user and return JWT
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
  /auth/me:
    get:
      summary: Get authenticated user profile
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
  /auth/addresses:
    post:
      summary: Create a new shipping address for the user
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
  /products:
    get:
      summary: Retrieve a paginated list of products
      tags:
        - Products
      parameters:
        - name: query
          in: query
          schema:
            type: string
          description: Search keyword
        - name: category
          in: query
          schema:
            type: string
        - name: brand
          in: query
          schema:
            type: string
        - name: priceMin
          in: query
          schema:
            type: number
            format: float
        - name: priceMax
          in: query
          schema:
            type: number
            format: float
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, price_asc, price_desc, newest]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
      responses:
        '200':
          description: Product listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      summary: Create a new product
      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{productId}:
    get:
      summary: Get product detail by ID
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '404':
          description: Product not found
    put:
      summary: Update a product
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      summary: Delete or deactivate a product
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Product deleted
  /cart:
    get:
      summary: Get current user cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    post:
      summary: Add item to cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemInput'
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
  /checkout:
    post:
      summary: Create an order from cart and payment request
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutInput'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /orders:
    get:
      summary: List user orders
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
  /orders/{orderId}:
    get:
      summary: Get order detail by ID
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /payments:
    post:
      summary: Initiate payment for order
      tags:
        - Payments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInput'
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
  /search:
    get:
      summary: Search products with query and filters
      tags:
        - Search
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: brand
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, price_asc, price_desc, newest]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
  /admin/campaigns:
    get:
      summary: Get homepage campaigns
      tags:
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Campaign list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Campaign'
    post:
      summary: Create a new homepage campaign
      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignInput'
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
  /merchant/orders:
    get:
      summary: Merchant view of assigned orders
      tags:
        - Merchant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Merchant orders list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, admin, merchant]
        createdAt:
          type: string
          format: date-time
    AddressInput:
      type: object
      required: [label, street, city, postalCode, country]
      properties:
        label:
          type: string
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
    Address:
      allOf:
        - $ref: '#/components/schemas/AddressInput'
        - type: object
          properties:
            id:
              type: string
            userId:
              type: string
    ProductInput:
      type: object
      required: [name, price, brandId, categories]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        salePrice:
          type: number
          format: float
        brandId:
          type: string
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantInput'
    ProductVariantInput:
      type: object
      required: [sku, color, size, stock]
      properties:
        sku:
          type: string
        color:
          type: string
        size:
          type: string
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        salePrice:
          type: number
          format: float
        brandId:
          type: string
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'
    ProductVariant:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        color:
          type: string
        size:
          type: string
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
    ProductListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    ProductDetailResponse:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
    CartItemInput:
      type: object
      required: [productVariantId, quantity]
      properties:
        productVariantId:
          type: string
        quantity:
          type: integer
    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: number
          format: float
        total:
          type: number
          format: float
        discounts:
          type: array
          items:
            $ref: '#/components/schemas/Discount'
    CartItem:
      type: object
      properties:
        id:
          type: string
        productVariantId:
          type: string
        productName:
          type: string
        productImage:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        totalPrice:
          type: number
          format: float
    Discount:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        amount:
          type: number
          format: float
    CheckoutInput:
      type: object
      required: [cartId, shippingAddressId, shippingMethod, paymentMethod]
      properties:
        cartId:
          type: string
        shippingAddressId:
          type: string
        shippingMethod:
          type: string
        paymentMethod:
          type: string
        voucherCode:
          type: string
    OrderResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        totalAmount:
          type: number
          format: float
        paymentStatus:
          type: string
          enum: [pending, paid, failed]
        fulfillmentStatus:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    OrderItem:
      type: object
      properties:
        productVariantId:
          type: string
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        totalPrice:
          type: number
          format: float
    OrderListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
    PaymentInput:
      type: object
      required: [orderId, method]
      properties:
        orderId:
          type: string
        method:
          type: string
          enum: [credit_card, bank_transfer, gopay, ovo, dana, cod]
        returnUrl:
          type: string
    PaymentResponse:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        providerReference:
          type: string
        paymentUrl:
          type: string
    Campaign:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        bannerImageUrl:
          type: string
        ctaLink:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
        isActive:
          type: boolean
    CampaignInput:
      type: object
      required: [title, bannerImageUrl, ctaLink, activeFrom, activeTo]
      properties:
        title:
          type: string
        bannerImageUrl:
          type: string
        ctaLink:
          type: string
        activeFrom:
          type: string
          format: date-time
        activeTo:
          type: string
          format: date-time
